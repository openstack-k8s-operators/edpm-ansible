- name: Gather user fact
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - "!min"
      - "user"
  when:
    - ansible_user is undefined

- name: Ensure /var/lib/config-data and /var/lib/config-data/ansible-generated exist
  when:
    - edpm_ovn_bgp_agent_config_basedir is match('/var/lib/config-data/ansible-generated')
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0750'
    owner: "{{ ansible_user | default(ansible_user_id) }}"
    group: "{{ ansible_user | default(ansible_user_id) }}"
    setype: container_file_t
  loop:
    - "/var/lib/config-data"
    - "/var/lib/config-data/ansible-generated"

- name: Create persistent directories
  become: true
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    setype: "{{ item.setype }}"
    mode: "{{ item.mode }}"
    owner: "{{ ansible_user | default(ansible_user_id) }}"
    group: "{{ ansible_user | default(ansible_user_id) }}"
  loop:
    - {'path': "{{ edpm_ovn_bgp_agent_config_basedir }}", 'setype': container_file_t, 'mode': '0750'}

- name: Create directory {{ edpm_ovn_bgp_agent_config_basedir }}
  become: true
  ansible.builtin.file:
    path: "{{ edpm_ovn_bgp_agent_config_basedir }}/etc/ovn-bgp-agent"
    recurse: true
    state: directory
    selevel: s0
    setype: container_file_t
    owner: "{{ ansible_user | default(ansible_user_id) }}"
    group: "{{ ansible_user | default(ansible_user_id) }}"
