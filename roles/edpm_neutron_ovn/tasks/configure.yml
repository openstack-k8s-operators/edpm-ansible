- name: Gather facts if they don't exist
  when: "'system' not in ansible_facts"
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - "!min"
      - "system"

- name: Configure neutron configuration files
  block:
    - name: Render neutron config files
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ edpm_neutron_ovn_agent_config_dir }}/{{ item.dest }}"
        setype: "container_file_t"
        mode: "0644"
      loop:
        - {"src": "config/rootwrap.conf.j2", "dest": "01-rootwrap.conf"}
        - {"src": "config/neutron-ovn-agent.conf.j2", "dest": "01-neutron-ovn-agent.conf"}

    - name: Discover secrets in {{ edpm_neutron_ovn_config_src }}
      ansible.builtin.find:
        paths: "{{ edpm_neutron_ovn_config_src }}"
        file_type: file
        recurse: true
        patterns:
          - "*ovn.conf"
          - "*metadata*conf"
      register: edpm_neutron_ovn_secrets
      delegate_to: localhost
      become: false

    - name: Flatten secrets into {{ edpm_neutron_ovn_agent_config_dir }}
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ edpm_neutron_ovn_agent_config_dir }}/{{ item.path | basename }}"
        setype: "container_file_t"
        mode: "0644"
      loop: "{{ edpm_neutron_ovn_secrets.files }}"

    # Configure BGP external-ids in OVS when the ovn-agent is configured
    # with the ovn-bgp extension.
    - name: Set neutron-bgp external-ids in OVS
      become: true
      ansible.builtin.command:
        cmd: >-
          ovs-vsctl --no-wait -- set Open_vSwitch .
          external-ids:neutron-bgp-peer-bridges={{ edpm_neutron_ovn_agent_bgp_peer_bridges }}
          external-ids:neutron-bgp-interconnect-bridge={{ edpm_neutron_ovn_agent_bgp_interconnect_bridge }}
      # edpm_neutron_ovn_agent_bgp_interconnect_bridge has a non-empty default, but
      # edpm_neutron_ovn_agent_bgp_peer_bridges is empty by default and should only be
      # set when BGP is enabled, so it is used as the gate for this task.
      when: edpm_neutron_ovn_agent_bgp_peer_bridges != ''
      changed_when: true

    - name: EVPN extension configuration
      when: "'ovn-evpn' in edpm_neutron_ovn_agent_agent_extensions.split(',') | map('trim') | list"
      block:
        - name: Gather ansible_local facts
          ansible.builtin.setup:
            gather_subset:
              - "!all"
              - "!min"
              - "local"
          when:
            - ansible_local is not defined

        - name: Load vrf kernel module
          ansible.builtin.import_role:
            name: osp.edpm.edpm_module_load
          vars:
            modules:
              - name: vrf

        - name: Set effective EVPN local IP
          ansible.builtin.set_fact:
            _edpm_neutron_ovn_evpn_local_ip_effective: >-
              {{ edpm_neutron_ovn_evpn_local_ip if edpm_neutron_ovn_evpn_local_ip | length > 0
                 else hostvars[inventory_hostname][(edpm_frr_bgp_ipv4_src_network | default('ctlplane')) ~ '_ip'] }}

        - name: Set EVPN external-ids in OVS
          become: true
          ansible.builtin.command:
            cmd: >-
              ovs-vsctl --no-wait -- set Open_vSwitch .
              external-ids:ovn-evpn-local-ip={{ _edpm_neutron_ovn_evpn_local_ip_effective }}
              external-ids:ovn-evpn-vxlan-ports={{ edpm_neutron_ovn_evpn_vxlan_port }}
          changed_when: true
