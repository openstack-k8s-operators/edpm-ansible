# ============================================================================
# Leapp OS Upgrade - Prepare Phase
# ============================================================================

- name: Run leapp upgrade init command
  become: true
  ansible.builtin.command:
    cmd: "{{ _leapp_repo_init_command }}"
  changed_when: true
  when:
    - _leapp_repo_init_command is string
    - _leapp_repo_init_command | length > 0

- name: Ensure prerequisite packages are installed
  become: true
  ansible.builtin.package:
    name: "{{ _leapp_upgrade_base_packages }}"
    state: present
  when:
    - _leapp_upgrade_base_packages is string
    - _leapp_upgrade_base_packages | length > 0

- name: Install leapp-upgrade
  become: true
  ansible.builtin.package:
    name: "{{ _leapp_packages }}"
    state: latest  # noqa package-latest
