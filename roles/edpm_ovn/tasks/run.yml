- name: Set OVN role path for quadlet templates
  ansible.builtin.set_fact:
    _edpm_ovn_role_path: "{{ role_path }}"

- name: Set cacert mount if present
  block:
    - name: Determine if cacert file exists
      ansible.builtin.stat:
        path: "{{ edpm_ovn_controller_tls_cacert_bundle_src }}"
      register: cacert_bundle_exists

    - name: Set ca_cert mount
      ansible.builtin.set_fact:
        edpm_ovn_controller_tls_cacert_volumes:
          - "{{ edpm_ovn_controller_tls_cacert_bundle_src }}:{{ edpm_ovn_controller_tls_cacert_bundle_dest }}:ro,z"
      when: cacert_bundle_exists.stat.exists

- name: Update ovn_controller health check script
  ansible.builtin.include_tasks:
    file: healthchecks.yml

- name: Run ovn_controller container
  ansible.builtin.include_role:
    name: osp.edpm.edpm_container_standalone
  vars:
    edpm_container_standalone_service: ovn_controller
    edpm_service_name: "{{ edpm_ovn_service_name }}"
    edpm_container_standalone_quadlet_defs:
      ovn_controller: "{{ _edpm_ovn_role_path }}/templates/quadlet/ovn_controller.container.j2"
    edpm_container_standalone_kolla_config_files:
      ovn_controller: "{{ lookup('template', 'kolla_config/kolla_ovn_controller.yaml.j2') | from_yaml }}"
    edpm_container_standalone_config_volumes: >-
      {{
        edpm_ovn_controller_common_volumes +
        (edpm_ovn_controller_tls_cacert_volumes | default([])) +
        (edpm_ovn_controller_tls_volumes if edpm_ovn_tls_enabled | bool else []) +
        (edpm_ovn_controller_healthcheck_volumes if edpm_ovn_healthcheck | bool else [])
      }}
