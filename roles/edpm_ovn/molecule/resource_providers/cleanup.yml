- name: Cleanup
  hosts: all
  gather_facts: false
  any_errors_fatal: true
  become: true
  tasks:
    - name: Cleanup edpm_ovn
      ansible.builtin.import_role:
        name: "osp.edpm.edpm_ovn"
        tasks_from: cleanup.yml
      vars:
        # Set the config that we need to preserve
        edpm_enable_chassis_gw: true

    - name: Get ovn-cms-options after cleanup
      ansible.builtin.shell: >
        /usr/bin/ovs-vsctl get open_vswitch . external_ids:ovn-cms-options
      register: cleanup_output
      failed_when: false

    - name: Debug ovn-cms-options after cleanup
      ansible.builtin.debug:
        var: cleanup_output.stdout

    - name: Verify resource provider configurations were removed
      ansible.builtin.assert:
        that:
          - "'resource_provider_bandwidths=' not in cleanup_output.stdout"
          - "'resource_provider_hypervisors=' not in cleanup_output.stdout"
          - "'resource_provider_inventory_defaults=' not in cleanup_output.stdout"
        fail_msg: "Resource provider configurations were not properly cleaned up"

    - name: Verify other configurations remain intact
      ansible.builtin.assert:
        that:
          - "'enable-chassis-as-gw' in cleanup_output.stdout"
        fail_msg: "Non-resource-provider configurations were incorrectly removed during cleanup"
