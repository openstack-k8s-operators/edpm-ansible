- name: Converge
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - include_role:
        name: "osp.edpm.edpm_ovn"
      vars:
        tenant_ip: "{{ ansible_host }}"
        edpm_ovn_dbs:
          - "{{ ansible_host }}"
        edpm_ovn_config_src: "{{lookup('env', 'MOLECULE_SCENARIO_DIRECTORY')}}/test-data"
        # Add non-resource-provider configurations to verify they remain after cleanup
        edpm_enable_chassis_gw: true
        # Comprehensive resource provider configuration testing
        edpm_ovn_resource_provider_bandwidths:
          br-ex:
            ingress: 10000000    # Full configuration
            egress: 15000000
          rp_tunnelled:
            egress: 25000000     # Egress-only configuration
          br-ext:
            ingress: 30000000    # Ingress-only configuration
          br-storage: {}         # Empty configuration (just hypervisor mapping)
        edpm_ovn_resource_provider_hypervisors:
          br-ex: "custom-compute-01"     # Override with custom name
          rp_tunnelled: "tunnel-host"    # Override with custom name
        edpm_ovn_resource_provider_inventory_defaults:
          allocation_ratio: 1.0
          min_unit: 10
          max_unit: 20
          reserved: 2
          step_size: 5
