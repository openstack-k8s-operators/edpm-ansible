---
argument_specs:
  # ./roles/edpm_ovn/tasks/main.yml entry point
  main:
    short_description: The main entry point for the edpm_ovn role.
    options:
      edpm_ovn_images_download_delay:
        type: int
        default: 5
        description: The seconds between retries for failed download tasks
      edpm_ovn_images_download_retries:
        type: int
        default: 5
        description: The number of retries for failed download tasks
      edpm_enable_chassis_gw:
        default: false
        description: ''
        type: bool
      edpm_enable_chassis_extport:
        default: false
        description: >
          Mark Chassis as eligible for scheduling OVN's external ports
        type: bool
      edpm_enable_hw_offload:
        default: false
        description: ''
        type: bool
      edpm_ovn_tls_enabled:
        default: false
        description: >
          Should OVN use tls for default protocol?
          If set to false, the OVN will default to tcp.
        type: bool
      edpm_ovn_availability_zones:
        default: []
        description: Availability zones for the chassis
        type: list
      edpm_ovn_resource_provider_bandwidths:
        default: {}
        description: >
          Dictionary defining bandwidth limits and hypervisor mappings for resource providers.
          Format: { bridge_name: { ingress: value, egress: value } }.
          Both ingress and egress are optional. Missing values result in empty fields.
          Each provider will automatically be mapped to the current host's FQDN for hypervisors.
          Examples: Full config { "br-ex": { "ingress": 10000000, "egress": 15000000 } },
          Egress only { "br-ex": { "egress": 15000000 } }, No bandwidth { "br-ex": {} }
        type: dict
      edpm_ovn_resource_provider_inventory_defaults:
        default: {}
        description: >
          Dictionary defining default inventory settings for all resource providers.
          Format: { option_name: value }. All options are optional.
          Supported options: allocation_ratio, min_unit, max_unit, reserved, step_size.
          Example: { "allocation_ratio": 1.0, "min_unit": 10, "max_unit": 20, "reserved": 2, "step_size": 5 }
        type: dict
      edpm_ovn_resource_provider_hypervisors:
        default: {}
        description: >
          Dictionary defining custom hypervisor mappings for resource providers.
          Format: { bridge_name: "hypervisor_name" }.
          If not set, defaults to mapping each provider from edpm_ovn_resource_provider_bandwidths to the host FQDN.
          This variable allows overriding the automatic FQDN mapping with custom hypervisor names.
          Examples: { "br-ex": "compute-01", "rp_tunnelled": "compute-01-tunnel" }
        type: dict
      edpm_ovn_bridge:
        default: br-int
        description: >
          Passed to the `edpm_ovn_ovs_external_ids` as value for the `ovn-bridge`.
        type: str
      edpm_ovn_bridge_mappings:
        default:
          - datacentre:br-ex
        description: ''
        type: list
      edpm_ovn_controller_agent_image:
        default: quay.io/podified-antelope-centos9/openstack-ovn-controller:current-podified
        description: URL of the controller agent image.
        type: str
      edpm_ovn_controller_common_volumes:
        default:
          - /lib/modules:/lib/modules:ro
          - /run:/run
          - /var/lib/openvswitch/ovn:/run/ovn:shared,z
          - /var/lib/kolla/config_files/ovn_controller.json:/var/lib/kolla/config_files/config.json:ro
        description: List of volumes in a mount point form.
        type: list
      edpm_ovn_controller_tls_volumes:
        default:
          - /var/lib/openstack/certs/ovn/default/ca.crt:/etc/pki/tls/certs/ovndbca.crt:ro,z
          - /var/lib/openstack/certs/ovn/default/tls.crt:/etc/pki/tls/certs/ovndb.crt:ro,z
          - /var/lib/openstack/certs/ovn/default/tls.key:/etc/pki/tls/private/ovndb.key:ro,Z
        description: List of TLS volumes in a mount point form.
        type: list
      edpm_ovn_dbs:
        default: []
        description: ''
        type: list
      edpm_ovn_encap_ip:
        default: '{{ tenant_ip | default("") }}'
        description: >
          Defaults to value of the host variable `tenant_ip`.
          When `tenant_ip` is not set, it has to be configured with other IP address.
          Passed to the `edpm_ovn_ovs_external_ids` as value for the `ovn-encap-ip`.
        type: str
      edpm_ovn_encap_type:
        default: geneve
        description: >
          Passed to the `edpm_ovn_ovs_external_ids` as value for the `ovn-encap-type`.
        type: str
      edpm_ovn_encap_tos:
        default: '0'
        description: >
          Passed to the `edpm_ovn_ovs_external_ids` as value for the `ovn-encap-tos`.
        type: str
      edpm_ovn_multi_rhel:
        default: false
        description: ''
        type: bool
      edpm_ovn_ofctrl_wait_before_clear:
        default: 8000
        description: >
          Passed to the `edpm_ovn_ovs_external_ids` as value for the `ovn-ofctrl-wait-before-clear`.
        type: int
      ovn_match_northd_version:
        default: false
        description: >
          Passed to the `edpm_ovn_ovs_external_ids` as value for the `ovn-match-northd-version`
        type: bool
      ovn_monitor_all:
        default: true
        description: >
          Passed to the `edpm_ovn_ovs_external_ids` as value for the `ovn-monitor-all`.
        type: bool
      edpm_ovn_ovs_other_config:
        default: {}
        description: Openvswitch other_config
        type: dict
      edpm_ovn_remote_probe_interval:
        default: 60000
        description: >
          Passed to the `edpm_ovn_ovs_external_ids` as value for the `ovn-remote-probe-interval`.
        type: int
      edpm_ovn_sb_server_port:
        default: 6642
        description: ''
        type: int
      tenant_ip:
        description: Local IP address
        type: str
