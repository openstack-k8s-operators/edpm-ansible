---

- name: Extract filename from URL
  ansible.builtin.set_fact:
    _edpm_accel_drivers_filename: "{{ _edpm_accel_drivers_custom_url.split('/')[-1] }}"

- name: Check if custom driver URL has allowable extension for {{ vendor_name }}
  ansible.builtin.assert:
    that: _edpm_accel_drivers_filename | regex_search('\\.(rpm|run)$') is not none
    fail_msg: "Custom GPU driver URL must end with .rpm or .run extension. Current URL: {{ _edpm_accel_drivers_custom_url }}"

- name: Check if package is a .run file
  ansible.builtin.set_fact:
    _edpm_accel_drivers_is_run_file: "{{ _edpm_accel_drivers_filename.endswith('.run') }}"

- name: Assert .run file is not allowed on RHEL systems
  when: _edpm_accel_drivers_is_run_file | bool
  ansible.builtin.assert:
    that:
      - not (ansible_facts['distribution'] | lower == 'redhat')
    fail_msg: "Installing a .run driver file is not supported on RHEL. Please provide a .rpm file instead."
    success_msg: "Installing NVIDIA drivers from a .run file is UNSUPPORTED and may result in unexpected behavior."

- name: Handle DKMS restrictions for RPM
  when: not _edpm_accel_drivers_is_run_file | bool
  ansible.builtin.include_tasks: dkms_restrictions.yml

- name: Create cache directory for driver download
  become: true
  ansible.builtin.file:
    path: "{{ _edpm_accel_drivers_config.cache_dir }}"
    state: directory
    mode: '0755'

- name: Set temporary file path
  ansible.builtin.set_fact:
    _edpm_accel_drivers_temp_path: "{{ _edpm_accel_drivers_config.cache_dir }}/{{ _edpm_accel_drivers_filename }}"

- name: Download driver from custom URL for {{ vendor_name }}
  become: true
  ansible.builtin.get_url:
    url: "{{ _edpm_accel_drivers_custom_url }}"
    dest: "{{ _edpm_accel_drivers_temp_path }}"
    mode: "{{ '0755' if _edpm_accel_drivers_is_run_file else '0644' }}"
    validate_certs: "{{ not _edpm_accel_drivers_custom_url_ssl_no_verify }}"
  register: _edpm_accel_drivers_download_result
  until: _edpm_accel_drivers_download_result is succeeded
  retries: "{{ _edpm_accel_drivers_config.download.retries }}"
  delay: "{{ _edpm_accel_drivers_config.download.delay }}"

- name: Set package name to downloaded file path for RPM
  when: not _edpm_accel_drivers_is_run_file | bool
  ansible.builtin.set_fact:
    _edpm_accel_drivers_package: "{{ _edpm_accel_drivers_temp_path }}"

- name: Download DKMS build dependencies for .run file (UNSUPPORTED)
  when:
    - _edpm_accel_drivers_is_run_file | bool
    - vendor_name == 'nvidia_gpu'
  block:
    - ansible.builtin.import_tasks: kernel_version.yml  # noqa: name[missing]

    - name: Set DKMS packages list (UNSUPPORTED)
      ansible.builtin.set_fact:
        _edpm_accel_drivers_dkms_packages:
          - gcc
          - pciutils
          - "kernel-headers-{{ _edpm_accel_drivers_kernel_version }}"
          - "kernel-devel-{{ _edpm_accel_drivers_kernel_version }}"

    - name: Download DKMS build dependencies (UNSUPPORTED)
      vars:
        _edpm_accel_drivers_package: "{{ _edpm_accel_drivers_dkms_packages }}"
        _edpm_accel_drivers_disable_gpg_check: false
        _edpm_accel_drivers_download_only: true
      ansible.builtin.include_tasks: install_from_rpm.yml
