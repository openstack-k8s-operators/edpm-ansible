---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Verify nouveau blacklist file exists and contains correct entry
      ansible.builtin.slurp:
        src: /etc/modprobe.d/blacklist-nouveau.conf
      register: nouveau_file
      failed_when: "'blacklist nouveau' not in (nouveau_file.content | b64decode)"

    - name: Verify nvidia-smi binary exists
      ansible.builtin.stat:
        path: /usr/bin/nvidia-smi
      register: nvidia_smi_binary
      failed_when: not nvidia_smi_binary.stat.exists
