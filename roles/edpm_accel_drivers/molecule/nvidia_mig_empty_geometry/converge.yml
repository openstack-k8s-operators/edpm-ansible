---
- name: Converge with full geometry list (two GPUs)
  hosts: all
  roles:
    - role: "edpm_accel_drivers"
      vars:
        edpm_accel_drivers:
          features:
            nvidia_mig:
              manage: true
              geometries:
                - "14,14,14,14"
                - "2g.12gb,2g.12gb"

- name: Converge with empty geometry list to trigger removal of all MIG units
  hosts: all
  roles:
    - role: "edpm_accel_drivers"
      vars:
        edpm_accel_drivers:
          features:
            nvidia_mig:
              manage: true
              geometries: []
