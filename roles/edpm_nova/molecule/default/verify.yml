---
# This is an example playbook to execute Ansible tests.

- name: Verify
  hosts: compute-1
  gather_facts: false
  vars:
    test_helper_dir: "../../../../molecule/test-helpers"
    edpm_nova_tls_ca_src_dir: /tmp/pki
    edpm_nova_config_dest: /var/lib/openstack/nova
  tasks:
    - name: ensure expected directories exist
      ansible.builtin.include_tasks: "{{test_helper_dir}}/verify_dir.yaml"
      loop:
        # common directories
        - "/etc/tmpfiles.d/"
        - "/var/lib/openstack"
        - "/etc/ssh/ssh_known_hosts"
        # extrenal deps
        - "/var/lib/openstack/config/ceph"
         # nova directories
        - "/var/lib/nova"
        - "{{ edpm_nova_config_dest }}"
        - "/var/lib/_nova_secontext"
        - "/var/lib/nova/instances"
        # NOTE(sean-k-mooney): this directory is normaly created by the edpm_install_cert role
        # in molecule we create it in prepare so lets just assert it exists
        - "{{ edpm_nova_tls_ca_src_dir }}"

    - name: ensure extra mounts are present
      ansible.builtin.include_tasks: "{{test_helper_dir}}/verify_mounts.yaml"
      loop:
        - {"name": "nova_compute", "src": "/var/lib/vendor_integration",
            "dest": "/var/lib/vendor_integration"}
        - {"name": "nova_compute", "src": "/opt/vendor_integration_2",
            "dest": "/opt/vendor_integration_2", "options": "shared"}

    - name: ensure nova config mounts are present for both nova_compute and nova_nvme_cleaner containers
      ansible.builtin.include_tasks: "{{test_helper_dir}}/verify_mounts.yaml"
      loop:
        - name: "nova_compute"
          src: "{{ edpm_nova_config_dest }}"
          dest: "/var/lib/kolla/config_files/src"
          options: "ro"
        - name: "nova_nvme_cleaner"
          src: "{{ edpm_nova_config_dest }}"
          dest: "/var/lib/kolla/config_files/src/nova_shared"
          options: "ro"

    - name: ensure nvme cleaner container has /dev mounted
      ansible.builtin.include_tasks: "{{test_helper_dir}}/verify_mounts.yaml"
      loop:
        - {"name": "nova_nvme_cleaner", "src": "/dev", "dest": "/dev", "options": ""}

    - name: ensure systemd services are defined and functional
      ansible.builtin.include_tasks: "{{test_helper_dir}}/verify_systemd_unit.yaml"
      loop:
        - {"name": "edpm_nova_compute.service"}

    - name: ensure nvme cleaner systemd service exists and is running
      ansible.builtin.include_tasks: "{{test_helper_dir}}/verify_systemd_unit.yaml"
      loop:
        - {"name": "edpm_nova_nvme_cleaner.service", "running": true}

    - name: ensure podman container exists and are running
      ansible.builtin.include_tasks: "{{test_helper_dir}}/verify_podman.yaml"
      loop:
        - {"name": "nova_compute", "running": true}
        - {"name": "nova_nvme_cleaner", "running": true}

    - name: Slurp nova_compute_init Quadlet file
      become: true
      ansible.builtin.slurp:
        src: /etc/containers/systemd/edpm_nova_compute_init.container
      register: init_quadlet

    - name: Verify nova_compute_init Quadlet content
      vars:
        init_content: "{{ init_quadlet.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - "'Type=oneshot' in init_content"
          - "'RemainAfterExit=yes' in init_content"
          - "'SecurityLabelDisable=true' in init_content"
          - "'Network=none' in init_content"
          - "'nova_statedir_ownership.py' in init_content"
          - "'config_hash=' in init_content"
          - "init_content | regex_search('config_hash=(?!$)') is not none"
        fail_msg: "nova_compute_init Quadlet missing expected directives"

    - name: Slurp nova_compute Quadlet file
      become: true
      ansible.builtin.slurp:
        src: /etc/containers/systemd/edpm_nova_compute.container
      register: compute_quadlet

    - name: Verify nova_compute Quadlet content
      vars:
        compute_content: "{{ compute_quadlet.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - "'config_hash=' in compute_content"
          - "compute_content | regex_search('config_hash=(?!$)') is not none"
          - "'ContainerName=nova_compute' in compute_content"
          - "'openstack-nova-compute' in compute_content"
          - "'Network=host' in compute_content"
          - "'User=nova' in compute_content"
          - "'PodmanArgs=--privileged --pid=host' in compute_content"
          - "'LogDriver=journald' in compute_content"
          - "'Environment=KOLLA_CONFIG_STRATEGY=COPY_ALWAYS' in compute_content"
          - "'After=edpm_nova_compute_init.service' in compute_content"
          - "'Requires=edpm_nova_compute_init.service' in compute_content"
          - "'Restart=always' in compute_content"
          - "'WantedBy=multi-user.target' in compute_content"
          - "'Label=managed_by=edpm_ansible' in compute_content"
          - "'Volume=/var/lib/kolla/config_files/nova_compute.json:/var/lib/kolla/config_files/config.json:ro' in compute_content"
          - "'Volume={{ edpm_nova_config_dest }}:/var/lib/kolla/config_files/src:ro' in compute_content"
          - "'Volume=/etc/localtime:/etc/localtime:ro' in compute_content"
          - "'Volume=/lib/modules:/lib/modules:ro' in compute_content"
          - "'Volume=/dev:/dev' in compute_content"
          - "'Volume=/var/lib/libvirt:/var/lib/libvirt' in compute_content"
          - "'Volume=/run/libvirt:/run/libvirt:shared' in compute_content"
          - "'Volume=/var/lib/nova:/var/lib/nova:shared' in compute_content"
          - "'Volume=/var/lib/iscsi:/var/lib/iscsi' in compute_content"
          - "'Volume=/etc/multipath:/etc/multipath' in compute_content"
          - "'Volume=/etc/multipath.conf:/etc/multipath.conf:ro,Z' in compute_content"
          - "'Volume=/etc/iscsi:/etc/iscsi:ro' in compute_content"
          - "'Volume=/etc/nvme:/etc/nvme' in compute_content"
          - "'Volume=/var/lib/openstack/config/ceph:/var/lib/kolla/config_files/src/ceph:ro' in compute_content"
          - "'Volume=/etc/ssh/ssh_known_hosts:/etc/ssh/ssh_known_hosts:ro' in compute_content"
          - "'Volume={{ edpm_nova_tls_ca_src_dir }}/tls-ca-bundle.pem:/etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem:ro,z' in compute_content"
          - "'Volume=/var/lib/vendor_integration:/var/lib/vendor_integration:ro' in compute_content"
          - "'Volume=/opt/vendor_integration_2:/opt/vendor_integration_2:shared' in compute_content"
        fail_msg: "nova_compute Quadlet missing expected content"

    - name: Slurp nova_nvme_cleaner Quadlet file
      become: true
      ansible.builtin.slurp:
        src: /etc/containers/systemd/edpm_nova_nvme_cleaner.container
      register: cleaner_quadlet

    - name: Verify nova_nvme_cleaner Quadlet content
      vars:
        cleaner_content: "{{ cleaner_quadlet.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - "'config_hash=' in cleaner_content"
          - "cleaner_content | regex_search('config_hash=(?!$)') is not none"
          - "'ContainerName=nova_nvme_cleaner' in cleaner_content"
          - "'openstack-nova-compute' in cleaner_content"
          - "'Network=host' in cleaner_content"
          - "'User=root' in cleaner_content"
          - "'PodmanArgs=--privileged' in cleaner_content"
          - "'LogDriver=journald' in cleaner_content"
          - "'Environment=KOLLA_CONFIG_STRATEGY=COPY_ALWAYS' in cleaner_content"
          - "'Restart=always' in cleaner_content"
          - "'WantedBy=multi-user.target' in cleaner_content"
          - "'Label=managed_by=edpm_ansible' in cleaner_content"
          - "'Volume=/var/lib/kolla/config_files/nova_nvme_cleaner.json:/var/lib/kolla/config_files/config.json:ro' in cleaner_content"
          - "'Volume={{ edpm_nova_config_dest }}:/var/lib/kolla/config_files/src/nova_shared:ro' in cleaner_content"
          - "'Volume=/dev:/dev' in cleaner_content"
          - "'Volume=/etc/nvme:/etc/nvme' in cleaner_content"
          - "'Volume={{ edpm_nova_tls_ca_src_dir }}/tls-ca-bundle.pem:/etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem:ro,z' in cleaner_content"
        fail_msg: "nova_nvme_cleaner Quadlet missing expected content"

    - name: read nvme cleaner kolla config
      become: true
      ansible.builtin.slurp:
        src: /var/lib/kolla/config_files/nova_nvme_cleaner.json
      register: cleaner_kolla_cfg

    - name: parse nvme cleaner kolla config
      ansible.builtin.set_fact:
        cleaner_cfg_json: "{{ cleaner_kolla_cfg.content | b64decode | from_json }}"

    - name: Assert nvme cleaner kolla command content
      vars:
        cleaner_cmd: "{{ cleaner_cfg_json.command }}"
      ansible.builtin.assert:
        that:
          - "'/usr/bin/sleep infinity' in cleaner_cmd"
        fail_msg: "Cleaner kolla config missing expected command (/usr/bin/sleep infinity)"

    - name: Check nvme cleaner service active state
      become: true
      ansible.builtin.command: systemctl is-active edpm_nova_nvme_cleaner.service
      register: cleaner_unit_state

    - name: Assert nvme cleaner is active
      ansible.builtin.assert:
        that:
          - "cleaner_unit_state.stdout == 'active'"
        fail_msg: "Cleaner service not active: {{ cleaner_unit_state.stdout }}"

    - name: ensure kolla_set_configs copied the expected files
      become: true
      ansible.builtin.shell: |
        podman logs nova_compute 2>&1 | grep "{{item}}" > /dev/null
      loop:
        - "Copying /var/lib/kolla/config_files/src/nova-blank.conf to /etc/nova/nova.conf"
        - "Copying /var/lib/kolla/config_files/src/01-nova.conf to /etc/nova/nova.conf.d/01-nova.conf"
        - "Copying /var/lib/kolla/config_files/src/ssh-config to /var/lib/nova/.ssh/config"
        - "Copying /var/lib/kolla/config_files/src/ssh-privatekey to /var/lib/nova/.ssh/ssh-privatekey"
        - "Copying /var/lib/kolla/config_files/src/02-nova-host-specific.conf to /etc/nova/nova.conf.d/02-nova-host-specific.conf"
        - "Copying /var/lib/kolla/config_files/src/provider1.yaml to /etc/nova/provider_config/provider1.yaml"
        - "Copying /var/lib/kolla/config_files/src/run-on-host to /usr/sbin/iscsiadm"

    - name: slurp host specific config
      ansible.builtin.slurp:
        src: "{{ edpm_nova_config_dest }}/02-nova-host-specific.conf"
      register: host_specific_config

    - name: Assert that my_ip is rendered into the host specific config
      ansible.builtin.assert:
        that:
          - "'10.0.0.3' in host_specific_config.content | b64decode"

    - name: Assert libvirt is configured to use tls for live migration
      ansible.builtin.assert:
        that:
          - "'live_migration_with_native_tls = True' in host_specific_config.content | b64decode"
          - "'live_migration_uri = qemu+tls://%s/system' in host_specific_config.content | b64decode"

    - name: Assert that host is rendered into the host specific config
      ansible.builtin.assert:
        that:
          - "'edpm-0.localdomain' in host_specific_config.content | b64decode"

    - name: Check if user exists
      ansible.builtin.getent:
        database: passwd
        key: nova
      register: nova_user

    - name: Assert that nova user is created with kolla uid and gid
      ansible.builtin.assert:
        that:
          # user
          - "nova_user.ansible_facts.getent_passwd.nova[1] == '42436'"
          # group
          - "nova_user.ansible_facts.getent_passwd.nova[2] == '42436'"

    - name: Lookup libvirt group
      ansible.builtin.getent:
        database: group
        key: libvirt
      register: libvirt_group

    - name: Assert that nova is in the libvirt group
      ansible.builtin.assert:
        that:
          # 2: the users in the group
          - "'nova' in libvirt_group.ansible_facts.getent_group.libvirt[2]"

    - name: Stat /home/nova/.ssh/authorized_keys
      become: true
      ansible.builtin.stat:
        path: /home/nova/.ssh/authorized_keys
      register: nova_authorized_keys

    - name: Assert that nova user has authorized_keys on the host
      ansible.builtin.assert:
        that:
          - "nova_authorized_keys.stat.mode == '0600'"

    - name: Stat /var/lib/nova/compute_id
      become: true
      ansible.builtin.stat:
        path: /var/lib/nova/compute_id
      register: compute_id

    - name: Assert that compute_id exists, not empty, and read-only
      ansible.builtin.assert:
        that:
          - "compute_id.stat.size == 37"
          - "compute_id.stat.mode == '0400'"
          - "compute_id.stat.attr_flags == 'i'"

    - name: Check if after sync old file is removed
      ansible.builtin.stat:
        path: '/var/lib/openstack/nova/test.conf'
      register: nova_host_specific_conf

    - name: Assert that /var/lib/openstack/nova/test.conf file does not exist
      ansible.builtin.assert:
        that:
          - "not nova_host_specific_conf.stat.exists"

    - name: Disable nova nvme cleaner
      ansible.builtin.include_role:
        name: osp.edpm.edpm_nova
      vars:
        edpm_nova_enable_nvme_cleaner: false

    - name: Assert nvme cleaner container is unavailable or deleted
      become: true
      ansible.builtin.command: podman inspect nova_nvme_cleaner
      register: nvme_cleaner_exists
      # this will fail as container is deleted
      failed_when: false
      changed_when: false

    - name: Check Quadlet file presence after disable
      become: true
      ansible.builtin.stat:
        path: /etc/containers/systemd/edpm_nova_nvme_cleaner.container
      register: nvme_cleaner_quadlet_exists

    - name: Assert nvme cleaner removed
      ansible.builtin.assert:
        that:
          - nvme_cleaner_exists.rc != 0
          - not nvme_cleaner_quadlet_exists.stat.exists

    - name: Remove nvme_cleaner config directory to simulate update-only scenario
      become: true
      ansible.builtin.file:
        path: /var/lib/openstack/nova_nvme_cleaner
        state: absent

    - name: Run updates to simulate minor update
      ansible.builtin.include_role:
        name: osp.edpm.edpm_nova
        tasks_from: update.yml
      vars:
        edpm_nova_config_src: "{{lookup('env', 'MOLECULE_PROJECT_DIRECTORY')}}/molecule/default/test-data"
        edpm_nova_nvme_cleaner_command: "/usr/bin/sleep"
        edpm_nova_nvme_cleaner_args: "infinity"
        edpm_nova_enable_nvme_cleaner: true

    - name: Verify nvme_cleaner config directory exists after minor update
      become: true
      ansible.builtin.stat:
        path: /var/lib/openstack/nova_nvme_cleaner
      register: nvme_cleaner_dir_after_update

    - name: Assert nvme_cleaner directory exists after update
      ansible.builtin.assert:
        that:
          - nvme_cleaner_dir_after_update.stat.exists
          - nvme_cleaner_dir_after_update.stat.isdir
        fail_msg: "nvme_cleaner config directory does not exist after update"
