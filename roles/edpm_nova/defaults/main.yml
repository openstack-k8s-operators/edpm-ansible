# All variables intended for modification should be placed in this file.

# service name this role manages
edpm_nova_service_name: nova

# seconds between retries for download tasks
edpm_nova_image_download_delay: "{{ edpm_download_delay | default(60) }}"

# number of retries for download tasks
edpm_nova_image_download_retries: "{{ edpm_download_retries | default(5) }}"

# Note that the src dir is in the AEE container but the
# dest dir is on the target host
edpm_nova_config_src: /var/lib/openstack/configs/{{ edpm_nova_service_name }}
edpm_nova_config_dest: /var/lib/openstack/{{ edpm_nova_service_name }}
edpm_nova_compute_image: "quay.io/podified-antelope-centos9/openstack-nova-compute:current-podified"

# Libvirt TLS
edpm_nova_live_migration_tls: "{{ edpm_tls_certs_enabled | default(False) }}"
edpm_nova_live_migration_native_tls: "{{ edpm_tls_certs_enabled | default(False) }}"

# NOTE(sean-k-mooney): nova will use unix sockets for libvirt and communicate with ovs via tcp
# so we will not need the libvirt or ovs client certs or ca. nova will communicate other services
# via there api endpoints and will connect to rabbitmq. To support this we will need to trust
# the general ca root cert.
edpm_nova_tls_ca_src_dir: "/var/lib/openstack/cacerts/{{ edpm_nova_service_name }}"

# list of tripleo nova services to stop during EDPM adoption
edpm_nova_old_tripleo_compute_sevices:
  - tripleo_nova_compute.service
  - tripleo_nova_migration_target.service
  # Other control plane services, in case of all-in-one overcloud adoption
  - tripleo_nova_api_cron.service
  - tripleo_nova_api.service
  - tripleo_nova_conductor.service
  - tripleo_nova_metadata.service
  - tripleo_nova_scheduler.service
  - tripleo_nova_vnc_proxy.service

# a list of addtional host mounts
edpm_nova_extra_bind_mounts: []

# NVMe cleaner config
edpm_nova_nvme_cleaner_command: "/usr/share/openstack-nova/contrib/clean-on-delete"
edpm_nova_nvme_cleaner_args: "--nvme"
# make cleaner optional
edpm_nova_enable_nvme_cleaner: false

edpm_nova_nvme_cleaner_config_dest: /var/lib/openstack/nova_nvme_cleaner

# nova_compute_init volumes
edpm_nova_compute_init_common_volumes:
  - /dev/log:/dev/log
  - /var/lib/nova:/var/lib/nova:shared
  - /var/lib/_nova_secontext:/var/lib/_nova_secontext:shared,z
  - "{{ edpm_nova_config_dest }}/nova_statedir_ownership.py:/sbin/nova_statedir_ownership.py:z"

# nova_compute volumes
edpm_nova_compute_common_volumes:
  - /var/lib/kolla/config_files/nova_compute.json:/var/lib/kolla/config_files/config.json:ro
  - "{{ edpm_nova_config_dest }}:/var/lib/kolla/config_files/src:ro"
  - /etc/localtime:/etc/localtime:ro
  - /lib/modules:/lib/modules:ro
  - /dev:/dev
  - /var/lib/libvirt:/var/lib/libvirt
  - /run/libvirt:/run/libvirt:shared
  - /var/lib/nova:/var/lib/nova:shared
  - /var/lib/iscsi:/var/lib/iscsi
  - /etc/multipath:/etc/multipath
  - /etc/multipath.conf:/etc/multipath.conf:ro,Z
  - /etc/iscsi:/etc/iscsi:ro
  - /etc/nvme:/etc/nvme
  - /var/lib/openstack/config/ceph:/var/lib/kolla/config_files/src/ceph:ro
  - /etc/ssh/ssh_known_hosts:/etc/ssh/ssh_known_hosts:ro

edpm_nova_compute_tls_cacert_volumes:
  - "{{ edpm_nova_tls_ca_src_dir }}/tls-ca-bundle.pem:/etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem:ro,z"

# nova_nvme_cleaner volumes
edpm_nova_nvme_cleaner_common_volumes:
  - /var/lib/kolla/config_files/nova_nvme_cleaner.json:/var/lib/kolla/config_files/config.json:ro
  - "{{ edpm_nova_config_dest }}:/var/lib/kolla/config_files/src/nova_shared:ro"
  - /dev:/dev
  - /etc/nvme:/etc/nvme

edpm_nova_nvme_cleaner_tls_cacert_volumes:
  - "{{ edpm_nova_tls_ca_src_dir }}/tls-ca-bundle.pem:/etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem:ro,z"
