---
- name: Verify neutron-sriov-agent
  gather_facts: false
  hosts: all
  vars:
    test_helper_dir: "../../../../molecule/test-helpers"
  tasks:
    - name: Include defaults/main.yml
      ansible.builtin.include_vars: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/defaults/main.yml"

    - name: Ensure expected directories exist
      ansible.builtin.include_tasks: "{{ test_helper_dir }}/verify_dir.yaml"
      loop:
        - "/var/lib/neutron"
        - "/var/lib/kolla/config_files/neutron_sriov_agent.json"
        - "/var/lib/openstack/neutron-sriov-agent"

    - name: Ensure Quadlet .container file exists
      ansible.builtin.stat:
        path: "/etc/containers/systemd/edpm_neutron_sriov_agent.container"
      register: _quadlet_file
      failed_when: not _quadlet_file.stat.exists

    - name: Ensure staged Quadlet file exists
      ansible.builtin.stat:
        path: "/var/lib/edpm-config/quadlet-rendered/edpm_neutron_sriov_agent.container"
      register: _staged_file
      failed_when: not _staged_file.stat.exists

    - name: Read Quadlet file content
      become: true
      ansible.builtin.slurp:
        src: "/etc/containers/systemd/edpm_neutron_sriov_agent.container"
      register: _quadlet_content

    - name: Verify config_hash is populated in Quadlet file
      ansible.builtin.assert:
        that:
          - "(_quadlet_content.content | b64decode) is regex('# config_hash=.+')"
        fail_msg: "config_hash placeholder was not populated in Quadlet file"

    - name: Ensure systemd services are defined and functional
      ansible.builtin.include_tasks: "{{ test_helper_dir }}/verify_systemd_unit.yaml"
      loop:
        - {"name": "edpm_neutron_sriov_agent.service"}

    - name: Ensure podman container exists and is running
      ansible.builtin.include_tasks: "{{ test_helper_dir }}/verify_podman.yaml"
      loop:
        - "neutron_sriov_agent"

    - name: Ensure that 10-neutron-sriov.conf was copied into the container
      block:
        - name: SR-IOV config file exists
          become: true
          ansible.builtin.stat:
            path: "/var/lib/openstack/neutron-sriov-agent/10-neutron-sriov.conf"
          register: sriov_config

        - name: Assert that the config exists
          ansible.builtin.assert:
            that:
              - sriov_config.stat.exists
            fail_msg: "SR-IOV agent config file does not exist"

    - name: Ensure that configured root helper works
      ansible.builtin.shell: |
        podman exec neutron_sriov_agent {{ edpm_neutron_sriov_agent_AGENT_root_helper }} sleep 0

    - name: Slurp host specific config
      ansible.builtin.slurp:
        src: /var/lib/openstack/neutron-sriov-agent/01-neutron-sriov-agent.conf
      register: host_specific_config

    - name: Assert that host is rendered into the host specific config
      ansible.builtin.assert:
        that:
          - "'edpm-0.localdomain' in host_specific_config.content | b64decode"
