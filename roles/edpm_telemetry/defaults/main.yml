# All variables intended for modification should be placed in this file.
# Service name this role manages
edpm_telemetry_service_name: telemetry
# Directory in the ansibleEE container
edpm_telemetry_config_src: "/var/lib/openstack/configs/{{ edpm_telemetry_service_name }}"
# Directory in the compute node
edpm_telemetry_config_dest: "/var/lib/openstack/{{ edpm_telemetry_service_name }}"
# Image to use for node_exporter
edpm_telemetry_node_exporter_image: quay.io/prometheus/node-exporter:v1.5.0
# Image to use for podman_exporter
edpm_telemetry_podman_exporter_image: quay.io/openstack-k8s-operators/prometheus-podman-exporter:latest
# Image to use for Ceilometer
edpm_telemetry_ceilometer_compute_image: quay.io/podified-antelope-centos9/openstack-ceilometer-compute:current-podified
# Image to use for openstack_network_exporter
edpm_telemetry_openstack_network_exporter_image: quay.io/openstack-k8s-operators/openstack-network-exporter:latest
# Certificates location for tls encryption
edpm_telemetry_certs: "/var/lib/openstack/certs/{{ edpm_telemetry_service_name }}/default"
# CA certs location for tls encryption
edpm_telemetry_cacerts: "/var/lib/openstack/cacerts/{{ edpm_telemetry_service_name }}"
# If TLS should be enabled for telemetry
edpm_telemetry_tls_certs_enabled: "{{ edpm_tls_certs_enabled | default(False) }}"
# seconds between retries for download tasks
edpm_telemetry_image_download_delay: "{{ edpm_download_delay | default(60) }}"
# number of retries for download tasks
edpm_telemetry_image_download_retries: "{{ edpm_download_retries | default(5) }}"
# list of tripleo telemetry services to stop during EDPM adoption
edpm_telemetry_old_tripleo_compute_sevices:
  - tripleo_ceilometer_agent_compute.service
# Instruction for distribution of container health check scripts
edpm_telemetry_healthcheck_sources:
  ceilometer_agent_compute: ceilometer_agent
  node_exporter: exporter
  podman_exporter: exporter
  openstack_network_exporter: exporter
#  kepler: exporter
# If telemetry services should have health checks enabled
edpm_telemetry_healthcheck: true
# List of exporters to be deployed in the compute node
edpm_telemetry_enabled_exporters:
  - ceilometer_agent_compute
  - node_exporter
  - podman_exporter
  - openstack_network_exporter
# List of collectors to be enabled in openstack_network_exporter
# Default excludes control-plane-only collectors (ovnnorthd, ovsdbserver)
# Set to empty list [] to enable all collectors
edpm_telemetry_openstack_network_exporter_collectors:
  - bridge
  - coverage
  - datapath
  - interface
  - memory
  - ovn
  - pmd-perf
  - pmd-rxq
  - vswitch
# Log level for openstack_network_exporter
# Supported levels are: debug info notice warning error critical
# Default: info
edpm_telemetry_openstack_network_exporter_log_level: info

# Ceilometer agent compute volumes
edpm_telemetry_ceilometer_common_volumes:
  - "{{ edpm_telemetry_config_dest }}:/var/lib/kolla/config_files/src:z"
  - /var/lib/kolla/config_files/ceilometer_agent_compute.json:/var/lib/kolla/config_files/config.json:z
  - /run/libvirt:/run/libvirt:shared,ro
  - /etc/hosts:/etc/hosts:ro
  - /etc/pki/tls/certs/ca-bundle.trust.crt:/etc/pki/tls/certs/ca-bundle.trust.crt:ro
  - /etc/localtime:/etc/localtime:ro
  - /etc/pki/ca-trust/source/anchors:/etc/pki/ca-trust/source/anchors:ro
  - /dev/log:/dev/log
edpm_telemetry_ceilometer_tls_cacert_volumes:
  - "{{ edpm_telemetry_cacerts }}/tls-ca-bundle.pem:/etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem:ro,z"
edpm_telemetry_ceilometer_tls_volumes:
  - "{{ edpm_telemetry_certs }}:/etc/ceilometer/tls:z"

# Node exporter volumes
edpm_telemetry_node_exporter_common_volumes:
  - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:rw
  - /:/rootfs:ro
edpm_telemetry_node_exporter_tls_volumes:
  - "{{ edpm_telemetry_config_dest }}/node_exporter.yaml:/etc/node_exporter/node_exporter.yaml:z"
  - "{{ edpm_telemetry_certs }}:/etc/node_exporter/tls:z"

# Podman exporter volumes
edpm_telemetry_podman_exporter_common_volumes:
  - /run/podman/podman.sock:/run/podman/podman.sock:rw,z
edpm_telemetry_podman_exporter_tls_volumes:
  - "{{ edpm_telemetry_config_dest }}/podman_exporter.yaml:/etc/podman_exporter/podman_exporter.yaml:z"
  - "{{ edpm_telemetry_certs }}:/etc/podman_exporter/tls:z"

# OpenStack network exporter volumes
edpm_telemetry_network_exporter_common_volumes:
  - "{{ edpm_telemetry_config_dest }}/openstack_network_exporter.yaml:/etc/openstack_network_exporter/openstack_network_exporter.yaml:z"
  - /proc:/host/proc:ro
edpm_telemetry_network_exporter_tls_volumes:
  - "{{ edpm_telemetry_certs }}:/etc/openstack_network_exporter/tls:z"
edpm_telemetry_network_exporter_ovs_volumes:
  - /var/run/openvswitch:/run/openvswitch:rw,z
  - /var/lib/openvswitch/ovn:/run/ovn:rw,z
