---
- name: "Stop and disable old standalone service for {{ edpm_container_quadlet_service }}"
  ansible.builtin.systemd_service:
    name: "edpm_{{ edpm_container_quadlet_service }}"
    state: stopped
    enabled: false
  become: true
  failed_when: false

- name: "Cleanup old standalone service file for {{ edpm_container_quadlet_service }}"
  ansible.builtin.file:
    path: "/etc/systemd/system/edpm_{{ edpm_container_quadlet_service }}.service"
    state: absent
  become: true

- name: "Cleanup old quadlet kube files for {{ edpm_container_quadlet_service }}"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/etc/containers/systemd/edpm@.kube"
    - "/etc/containers/systemd/{{ edpm_container_quadlet_service }}.yaml"
  become: true
