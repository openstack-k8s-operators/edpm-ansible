---
argument_specs:
  # ./roles/edpm_container_quadlet/tasks/main.yml
  main:
    short_description: The main entry point for the edpm_container_quadlet role.
    options:
      edpm_container_quadlet_kolla_config_dir:
        default: "/var/lib/kolla/config_files"
        description: The location that kolla configuration files should be added to.
        type: path
      edpm_container_quadlet_systemd_config_dir:
        default: "/etc/containers/systemd"
        description: The default location for all quadlet related systemd files
        type: path
      edpm_container_quadlet_type:
        default: container
        description: >
          Quadlet unit type to generate. Supported values: container, kube.
          Determines the template used and the file extension written to
          /etc/containers/systemd/.
        type: str
        choices:
          - container
          - kube
      edpm_container_quadlet_service:
        default: ""
        description: >
          The name of the service being deployed. Used in the quadlet filename
          (edpm@<service>.container) and as the Podman container name.
        type: str
      edpm_container_quadlet_service_image:
        default: ""
        description: The container image that is used by the service
        type: str
      edpm_container_quadlet_service_volumes:
        default: []
        description: >
          A list of service-specific volume mount strings in Podman format
          (e.g. /host/path:/container/path:ro)
        type: list
      edpm_container_quadlet_service_use_host_network:
        default: false
        description: Whether the container uses host networking
        type: bool
      edpm_container_quadlet_service_privileged:
        default: true
        description: Whether the container runs in privileged mode
        type: bool
      edpm_container_quadlet_service_environment:
        default: {}
        description: >
          Dictionary of additional environment variables to set in the container.
          KOLLA_CONFIG_STRATEGY=COPY_ALWAYS is always included.
        type: dict
      edpm_container_quadlet_service_healthcheck_cmd:
        default: ""
        description: >
          Health check command to run inside the container.
          If empty, no health check is configured.
        type: str
      edpm_container_quadlet_service_after:
        default: []
        description: >
          List of systemd units this service should start after (After= directives)
        type: list
      edpm_container_quadlet_service_wants:
        default: []
        description: >
          List of systemd units this service wants running (Wants= directives)
        type: list
      edpm_container_quadlet_skip_start:
        default: false
        description: >
          Skip starting the systemd service. Useful for molecule tests
          or when the service should be rendered but not started.
        type: bool
      edpm_container_quadlet_common_volumes:
        default:
          - /etc/hosts:/etc/hosts:ro
          - /etc/localtime:/etc/localtime:ro
          - /etc/pki/ca-trust/extracted:/etc/pki/ca-trust/extracted:ro
          - /etc/pki/ca-trust/source/anchors:/etc/pki/ca-trust/source/anchors:ro
          - /etc/pki/tls/certs/ca-bundle.crt:/etc/pki/tls/certs/ca-bundle.crt:ro
          - /etc/pki/tls/certs/ca-bundle.trust.crt:/etc/pki/tls/certs/ca-bundle.trust.crt:ro
          - /etc/pki/tls/cert.pem:/etc/pki/tls/cert.pem:ro
          - /dev/log:/dev/log
        description: >
          List of common volume mounts included in all containers.
          Format: /host/path:/container/path[:options]
        type: list
      edpm_container_quadlet_internal_tls_volumes:
        default:
          - /etc/pki/tls/certs/httpd:/etc/pki/tls/certs/httpd:ro
          - /etc/pki/tls/private/httpd:/etc/pki/tls/private/httpd:ro
        description: List of TLS volumes used by most containers
        type: list
