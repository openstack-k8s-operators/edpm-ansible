- name: Ensure Openvswitch installed and running
  ansible.builtin.include_role:
    name: osp.edpm.edpm_ovs
    tasks_from: install.yml

- name: Set EVPN external-ids in OVS
  become: true
  ansible.builtin.command:
    cmd: >-
      ovs-vsctl --no-wait -- set Open_vSwitch .
      external-ids:ovn-evpn-local-ip={{ edpm_frr_ovn_evpn_local_ip }}
      external-ids:ovn-evpn-vxlan-ports={{ edpm_frr_evpn_ovn_vxlan_port }}
  changed_when: true

- name: Configure minimal FRR configuration for Neutron Frr EVPN driver
  ansible.builtin.template:
    src: config/frr.conf.evpn.j2
    dest: "{{ edpm_frr_config_basedir }}/etc/frr/frr.conf"
    mode: '0644'
    selevel: s0
    setype: container_file_t
  register: _frr_config_result
