---

- name: Download needed container images
  containers.podman.podman_image:
    name: "{{ item }}"
    auth_file: "{{ edpm_download_cache_podman_auth_file }}"
  loop:
    - "{{ edpm_cyborg_agent_image }}"
  become: true
  register: edpm_cyborg_images_download
  until: edpm_cyborg_images_download.failed == false
  retries: "{{ edpm_cyborg_image_download_retries }}"
  delay: "{{ edpm_cyborg_image_download_delay }}"
