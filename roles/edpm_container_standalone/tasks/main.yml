# "edpm_container_standalone" will search for and load any operating system variable file

- name: Ensure /var/lib/edpm-config exists with correct ownership
  become: true
  ansible.builtin.file:
    path: /var/lib/edpm-config
    state: directory
    owner: "{{ ansible_user | default(ansible_user_id) }}"
    group: "{{ ansible_user | default(ansible_user_id) }}"
    mode: "0755"
    recurse: true

- name: "Ensure directory exists: {{ edpm_container_kolla_config_dir }}"
  become: true
  ansible.builtin.file:
    path: "{{ edpm_container_kolla_config_dir }}"
    state: directory
    recurse: true
    setype: container_file_t

- name: Create kolla config files
  become: true
  ansible.builtin.copy:
    content: "{{ item.value | to_nice_json }}"
    dest: "{{ edpm_container_kolla_config_dir ~ '/' ~ item.key ~ '.json' }}"
    mode: "0600"
  loop: "{{ edpm_container_standalone_kolla_config_files | dict2items }}"

- name: Clean up old container_manage artifacts
  ansible.builtin.include_tasks: cleanup.yml
  # length > 0 is defensive; quadlet_defs is always populated when called from service roles
  when: edpm_container_standalone_quadlet_defs | length > 0

- name: "Deploy containers via Quadlet: [ {{ edpm_container_standalone_service }} ]"
  ansible.builtin.include_tasks: quadlet.yml

- name: Update service state file
  ansible.builtin.include_tasks: state_file_update.yml
  when:
    - edpm_container_track_state | bool
    - edpm_container_standalone_service is defined
    - edpm_container_standalone_service != ""
