# Quadlet-based container deployment. Each service role provides its own
# native .container.j2 templates via edpm_container_standalone_quadlet_defs.

- name: Ensure quadlet directory exists
  become: true
  ansible.builtin.file:
    path: "{{ edpm_container_standalone_quadlet_dir }}"
    state: directory
    mode: "0755"

- name: "Compute config hash for {{ edpm_container_standalone_service }}"
  become: true
  container_config_hash:
    volumes: "{{ edpm_container_standalone_config_volumes | default([]) }}"
  register: _edpm_config_hash

- name: "Write Quadlet .container files for {{ edpm_container_standalone_service }}"
  become: true
  ansible.builtin.template:
    src: "{{ item.value }}"
    dest: "{{ edpm_container_standalone_quadlet_dir }}/edpm_{{ item.key }}.container"
    mode: "0644"
  loop: "{{ edpm_container_standalone_quadlet_defs | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  register: _edpm_quadlet_files

- name: Reload systemd daemon for quadlet generator
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  when: _edpm_quadlet_files is changed  # noqa: no-handler

# Quadlet units are transient (systemd generator outputs) so enabled is not
# supported; daemon_reload ensures the generator runs before service lookup.
- name: "Start Quadlet container services for {{ edpm_container_standalone_service }}"
  become: true
  ansible.builtin.systemd:
    name: "edpm_{{ item.key }}.service"
    state: started
    daemon_reload: true
  loop: "{{ edpm_container_standalone_quadlet_defs | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  register: _edpm_quadlet_start
  retries: 5
  delay: 5
  until: _edpm_quadlet_start is not failed

- name: "Restart Quadlet container services for {{ edpm_container_standalone_service }}"
  become: true
  ansible.builtin.systemd:
    name: "edpm_{{ item.item.key }}.service"
    state: restarted
  loop: "{{ _edpm_quadlet_files.results | default([]) }}"
  loop_control:
    label: "{{ item.item.key }}"
  when: item is changed  # noqa: no-handler
  register: _edpm_quadlet_restart
  retries: 5
  delay: 5
  until: _edpm_quadlet_restart is not failed
