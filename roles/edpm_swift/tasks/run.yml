- name: Set role path for template resolution
  ansible.builtin.set_fact:
    _edpm_swift_role_path: "{{ role_path }}"

- name: Run swift containers
  ansible.builtin.include_role:
    name: osp.edpm.edpm_container_standalone
  vars:
    edpm_container_standalone_use_quadlet: true
    edpm_container_standalone_service: swift
    edpm_container_standalone_quadlet_defs:
      swift_account_auditor: "{{ _edpm_swift_role_path }}/templates/quadlet/swift_account_auditor.container.j2"
      swift_account_reaper: "{{ _edpm_swift_role_path }}/templates/quadlet/swift_account_reaper.container.j2"
      swift_account_replicator: "{{ _edpm_swift_role_path }}/templates/quadlet/swift_account_replicator.container.j2"
      swift_account_server: "{{ _edpm_swift_role_path }}/templates/quadlet/swift_account_server.container.j2"
      swift_container_auditor: "{{ _edpm_swift_role_path }}/templates/quadlet/swift_container_auditor.container.j2"
      swift_container_replicator: "{{ _edpm_swift_role_path }}/templates/quadlet/swift_container_replicator.container.j2"
      swift_container_server: "{{ _edpm_swift_role_path }}/templates/quadlet/swift_container_server.container.j2"
      swift_container_updater: "{{ _edpm_swift_role_path }}/templates/quadlet/swift_container_updater.container.j2"
      swift_object_auditor: "{{ _edpm_swift_role_path }}/templates/quadlet/swift_object_auditor.container.j2"
      swift_object_expirer: "{{ _edpm_swift_role_path }}/templates/quadlet/swift_object_expirer.container.j2"
      swift_object_replicator: "{{ _edpm_swift_role_path }}/templates/quadlet/swift_object_replicator.container.j2"
      swift_object_server: "{{ _edpm_swift_role_path }}/templates/quadlet/swift_object_server.container.j2"
      swift_object_updater: "{{ _edpm_swift_role_path }}/templates/quadlet/swift_object_updater.container.j2"
      rsync: "{{ _edpm_swift_role_path }}/templates/quadlet/rsync.container.j2"
    edpm_container_standalone_kolla_config_files:
      swift_account_auditor: "{{ lookup('file', 'kolla_config/swift_account_auditor.yaml') | from_yaml }}"
      swift_account_reaper: "{{ lookup('file', 'kolla_config/swift_account_reaper.yaml') | from_yaml }}"
      swift_account_replicator: "{{ lookup('file', 'kolla_config/swift_account_replicator.yaml') | from_yaml }}"
      swift_account_server: "{{ lookup('file', 'kolla_config/swift_account_server.yaml') | from_yaml }}"
      swift_container_auditor: "{{ lookup('file', 'kolla_config/swift_container_auditor.yaml') | from_yaml }}"
      swift_container_replicator: "{{ lookup('file', 'kolla_config/swift_container_replicator.yaml') | from_yaml }}"
      swift_container_server: "{{ lookup('file', 'kolla_config/swift_container_server.yaml') | from_yaml }}"
      swift_container_updater: "{{ lookup('file', 'kolla_config/swift_container_updater.yaml') | from_yaml }}"
      swift_object_auditor: "{{ lookup('file', 'kolla_config/swift_object_auditor.yaml') | from_yaml }}"
      swift_object_expirer: "{{ lookup('file', 'kolla_config/swift_object_expirer.yaml') | from_yaml }}"
      swift_object_replicator: "{{ lookup('file', 'kolla_config/swift_object_replicator.yaml') | from_yaml }}"
      swift_object_server: "{{ lookup('file', 'kolla_config/swift_object_server.yaml') | from_yaml }}"
      swift_object_updater: "{{ lookup('file', 'kolla_config/swift_object_updater.yaml') | from_yaml }}"
      rsync: "{{ lookup('file', 'kolla_config/rsync.yaml') | from_yaml }}"
