- name: Verify edpm_swift
  hosts: all
  gather_facts: false
  vars:
    test_helper_dir: "../../../../molecule/test-helpers"
  tasks:
    - name: Ensure expected directories exist
      ansible.builtin.include_tasks: "{{ test_helper_dir }}/verify_dir.yaml"
      loop:
        - "/var/lib/openstack/swift"
        - "/srv/node"
        - "/var/cache/swift"
        - "/var/lib/kolla/config_files"
        - "/var/lib/edpm-config/firewall"

    - name: Ensure swift ring files were extracted
      become: true
      ansible.builtin.stat:
        path: "/var/lib/openstack/swift/{{ item }}"
      register: ring_file
      loop:
        - account.ring.gz
        - container.ring.gz
        - object.ring.gz
    - name: Assert swift ring files exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
        fail_msg: "Ring file {{ item.item }} does not exist"
      loop: "{{ ring_file.results }}"

    - name: Ensure kolla config files exist
      become: true
      ansible.builtin.stat:
        path: "/var/lib/kolla/config_files/{{ item }}.json"
      register: kolla_config
      loop:
        - swift_account_auditor
        - swift_account_reaper
        - swift_account_replicator
        - swift_account_server
        - swift_container_auditor
        - swift_container_replicator
        - swift_container_server
        - swift_container_updater
        - swift_object_auditor
        - swift_object_expirer
        - swift_object_replicator
        - swift_object_server
        - swift_object_updater
        - rsync
    - name: Assert kolla config files exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
        fail_msg: "Kolla config file {{ item.item }}.json does not exist"
      loop: "{{ kolla_config.results }}"

    - name: Ensure Quadlet container files exist
      become: true
      ansible.builtin.stat:
        path: "/etc/containers/systemd/edpm_{{ item }}.container"
      register: quadlet_files
      loop:
        - swift_account_auditor
        - swift_account_reaper
        - swift_account_replicator
        - swift_account_server
        - swift_container_auditor
        - swift_container_replicator
        - swift_container_server
        - swift_container_updater
        - swift_object_auditor
        - swift_object_expirer
        - swift_object_replicator
        - swift_object_server
        - swift_object_updater
        - rsync
    - name: Assert Quadlet container files exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
        fail_msg: "Quadlet file edpm_{{ item.item }}.container does not exist"
      loop: "{{ quadlet_files.results }}"

    - name: Slurp swift_account_server Quadlet file
      become: true
      ansible.builtin.slurp:
        src: /etc/containers/systemd/edpm_swift_account_server.container
      register: account_server_quadlet

    - name: Verify swift_account_server Quadlet content
      vars:
        content: "{{ account_server_quadlet.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - "'config_hash=' in content"
          - "content | regex_search('config_hash=(?!$)') is not none"
          - "'ContainerName=swift_account_server' in content"
          - "'openstack-swift-account' in content"
          - "'Network=host' in content"
          - "'User=swift' in content"
          - "'--privileged' in content"
          - "'--pid=host' in content"
          - "'--cgroupns=host' in content"
          - "'LogDriver=journald' in content"
          - "'Environment=KOLLA_CONFIG_STRATEGY=COPY_ALWAYS' in content"
          - "'Restart=always' in content"
          - "'WantedBy=multi-user.target' in content"
          - "'Label=managed_by=edpm_ansible' in content"
          - "'Volume=/var/lib/kolla/config_files/swift_account_server.json:/var/lib/kolla/config_files/config.json:ro' in content"
          - "'Volume=/srv/node:/srv/node' in content"
          - "'Volume=/dev:/dev' in content"
          - "'Volume=/var/cache/swift:/var/cache/swift' in content"
        fail_msg: "swift_account_server Quadlet missing expected content"

    - name: Slurp rsync Quadlet file
      become: true
      ansible.builtin.slurp:
        src: /etc/containers/systemd/edpm_rsync.container
      register: rsync_quadlet

    - name: Verify rsync Quadlet content
      vars:
        content: "{{ rsync_quadlet.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - "'config_hash=' in content"
          - "content | regex_search('config_hash=(?!$)') is not none"
          - "'ContainerName=rsync' in content"
          - "'AddCapability=NET_BIND_SERVICE' in content"
          - "'Volume=/var/lib/kolla/config_files/rsync.json:/var/lib/kolla/config_files/config.json:ro' in content"
        fail_msg: "rsync Quadlet missing expected content"

    - name: Ensure firewall rules file exists
      become: true
      block:
        - name: Check if swift firewall rules file exists
          ansible.builtin.stat:
            path: /var/lib/edpm-config/firewall/swift.yaml
          register: firewall_rules
        - name: Assert swift firewall rules file exists
          ansible.builtin.assert:
            that:
              - firewall_rules.stat.exists
            fail_msg: "Swift firewall rules file does not exist"

    - name: Ensure nftables rules are loaded for swift
      become: true
      ansible.builtin.shell: grep -q "{{ item }}" /etc/nftables/edpm-rules.nft
      register: nft_rules
      ignore_errors: true
      loop:
        - "100 swift account server"
        - "100 swift container server"
        - "100 swift object server"
        - "100 swift rsync server"
    - name: Assert nftables rules are loaded
      ansible.builtin.assert:
        that:
          - item.rc == 0
        fail_msg: "nftables rule '{{ item.item }}' not found in edpm-rules.nft"
      loop: "{{ nft_rules.results }}"

    - name: Ensure podman containers exist and are running
      ansible.builtin.include_tasks: "{{ test_helper_dir }}/verify_podman.yaml"
      loop:
        - swift_account_auditor
        - swift_account_reaper
        - swift_account_server
        - swift_container_auditor
        - swift_container_server
        - swift_container_updater
        - swift_object_auditor
        - swift_object_replicator
        - swift_object_server
        - swift_object_updater
        - rsync

    # Replicators (account, container) and object-expirer fail with
    # dummy ring files in molecule. With Quadlet, crashed containers
    # are removed (--rm). Verify the systemd units exist instead.
    - name: Ensure failing services have systemd units
      ansible.builtin.include_tasks: "{{ test_helper_dir }}/verify_systemd_unit.yaml"
      loop:
        - { "name": "edpm_swift_account_replicator.service", "running": false }
        - { "name": "edpm_swift_container_replicator.service", "running": false }
        - { "name": "edpm_swift_object_expirer.service", "running": false }

    - name: Ensure systemd services are defined and functional
      ansible.builtin.include_tasks: "{{ test_helper_dir }}/verify_systemd_unit.yaml"
      loop:
        - { "name": "edpm_swift_account_auditor.service" }
        - { "name": "edpm_swift_account_reaper.service" }
        - { "name": "edpm_swift_account_server.service" }
        - { "name": "edpm_swift_container_auditor.service" }
        - { "name": "edpm_swift_container_server.service" }
        - { "name": "edpm_swift_container_updater.service" }
        - { "name": "edpm_swift_object_auditor.service" }
        - { "name": "edpm_swift_object_replicator.service" }
        - { "name": "edpm_swift_object_server.service" }
        - { "name": "edpm_swift_object_updater.service" }
        - { "name": "edpm_rsync.service" }
        # These fail with dummy ring files in molecule
        - { "name": "edpm_swift_account_replicator.service", "running": false }
        - {
            "name": "edpm_swift_container_replicator.service",
            "running": false,
          }
        - { "name": "edpm_swift_object_expirer.service", "running": false }
